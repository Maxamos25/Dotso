<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dotso — browse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#16151A; --surface:#1F1E24; --surface-2:#26252C;
    --ink:#ECE9E2; --ink-soft:#9C98A6; --ink-faint:#6b6776;
    --line:#34323a; --amber:#D9A441;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{ background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh; padding:36px 24px 100px; }
  .page{ max-width:980px; margin:0 auto; }

  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; padding-bottom:16px; border-bottom:1px solid var(--line); }
  .logo{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; }
  .logo .mark{ color:var(--ink-soft); }
  .topnav{ display:flex; gap:22px; font-size:13px; font-family:'JetBrains Mono',monospace; }
  .topnav a{ color:var(--amber); text-decoration:none; opacity:0.6; }
  .topnav a:hover{ opacity:1; }
  .topnav span.active{ color:var(--amber); opacity:1; }

  .search-block{ margin-bottom:28px; }
  .search-row{ display:flex; gap:10px; margin-bottom:14px; }
  .search-input{
    flex:1; background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:13px 16px; color:var(--ink); font-size:14px; font-family:'Inter',sans-serif; outline:none;
    transition:border-color 0.12s;
  }
  .search-input:focus{ border-color:var(--amber); }
  .search-input::placeholder{ color:var(--ink-faint); }

  .active-tag-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-height:28px; }
  .active-label{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-faint); }
  .active-tag{
    font-family:'JetBrains Mono',monospace; font-size:12px; padding:4px 10px;
    background:var(--surface-2); border:1px solid var(--amber); border-radius:7px;
    display:inline-flex; align-items:center; gap:6px; color:var(--ink); cursor:pointer;
  }
  .active-tag .x{ color:var(--ink-faint); }
  .active-tag:hover .x{ color:var(--ink); }

  .meta-row{ display:flex; justify-content:space-between; align-items:baseline; margin:24px 0 16px; font-size:13px; color:var(--ink-faint); }
  .result-count{ font-family:'JetBrains Mono',monospace; }
  .sort-controls{ display:flex; align-items:center; gap:8px; }
  .sort-label{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint); }
  .sort-btn{
    font-family:'JetBrains Mono',monospace; font-size:11.5px; padding:5px 12px;
    border-radius:99px; border:1px solid var(--line); background:transparent;
    color:var(--ink-soft); cursor:pointer; transition:all 0.12s;
  }
  .sort-btn:hover{ border-color:var(--ink-faint); color:var(--ink); }
  .sort-btn.active{ background:var(--surface-2); border-color:var(--amber); color:var(--ink); }
  .online-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:#4ECDC4; margin-right:4px; vertical-align:middle; }

  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  @media(max-width:680px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  @media(max-width:440px){ .grid{ grid-template-columns:1fr; } }

  .pcard{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    overflow:hidden; transition:border-color 0.15s; display:flex; flex-direction:column;
  }
  .pcard:hover{ border-color:var(--ink-faint); }
  .pcard .strip{ height:48px; position:relative; }
  .pcard .body{ padding:14px 16px 16px; flex:1; display:flex; flex-direction:column; gap:6px; }
  .pcard .pname{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; }
  .pcard .phandle{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint); }
  .pcard .pline{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; flex:1; }
  .pcard .ptags{ display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
  .pcard .ptag{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:3px 7px;
    border-radius:5px; background:rgba(255,255,255,0.06); color:var(--ink-soft);
  }
  .pcard .ptag.match{ background:rgba(217,164,65,0.15); color:var(--amber); }
  .pcard .card-footer{ display:flex; align-items:center; justify-content:space-between; padding:10px 16px 14px; }
  .follow-btn{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:5px 12px;
    border-radius:7px; border:1px solid var(--line); background:transparent;
    color:var(--ink-soft); cursor:pointer; transition:all 0.12s;
  }
  .follow-btn:hover{ border-color:var(--amber); color:var(--amber); }
  .follow-btn.following{ border-color:rgba(255,255,255,0.1); color:var(--ink-faint); }
  .follow-btn.following:hover{ border-color:rgba(220,60,60,0.4); color:#e05c5c; }
  .online-badge{
    font-family:'JetBrains Mono',monospace; font-size:10px; color:#4ECDC4;
    display:flex; align-items:center; gap:4px;
  }

  /* palette strip colors */
  .strip-0{ background:linear-gradient(135deg,#221f28,#1c1a1f); }
  .strip-1{ background:linear-gradient(135deg,#efeae0,#e6e0d2); }
  .strip-2{ background:linear-gradient(135deg,#1A0F2E,#251640); }
  .strip-3{ background:linear-gradient(135deg,#1A0F2E,#FF2E88 200%); }
  .strip-4{ background:linear-gradient(135deg,#F7F6F2,#e6e0d2); }
  .strip-5{ background:linear-gradient(135deg,#EFE9DC,#e3d9c2); }

  .empty-state{
    grid-column:1/-1; text-align:center; padding:60px 20px;
    color:var(--ink-faint); font-size:14px; line-height:1.8;
  }
  .loading-state{
    grid-column:1/-1; text-align:center; padding:60px 20px;
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-faint);
  }

  .footnote{
    margin-top:44px; text-align:center; font-family:'JetBrains Mono',monospace;
    font-size:11.5px; color:var(--ink-faint); line-height:1.8;
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="logo"><span class="mark">/</span>dotso</div>
    <div class="topnav">
      <span class="active">browse</span>
      <a href="dashboard.html">dashboard</a>
      <a href="messages.html">messages</a>
    </div>
  </div>

  <div class="search-block">
    <div class="search-row">
      <input class="search-input" id="search-input" type="text" placeholder="search by tag or name...">
    </div>
    <div class="active-tag-row" id="active-tags">
      <span class="active-label" id="browse-label" style="display:none;">filtering:</span>
    </div>
  </div>

  <div class="meta-row">
    <span class="result-count" id="result-count">loading...</span>
    <div class="sort-controls">
      <span class="sort-label">sort by:</span>
      <button class="sort-btn active" data-sort="random">random</button>
      <button class="sort-btn" data-sort="active">most active</button>
      <button class="sort-btn" data-sort="online"><span class="online-dot"></span>online now</button>
    </div>
  </div>

  <div class="grid" id="profile-grid">
    <div class="loading-state">loading profiles...</div>
  </div>

  <div class="footnote">this list is not ranked or sorted by popularity — just people on dotso</div>
</div>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAj-pIFaW0OuDUfEbaOm_zFhu4fU9kXZbM",
    authDomain: "dotso-fec33.firebaseapp.com",
    projectId: "dotso-fec33",
    storageBucket: "dotso-fec33.firebasestorage.app",
    messagingSenderId: "202217283559",
    appId: "1:202217283559:web:8359ebd1844657b720a742"
  });
  const _auth = firebase.auth();
  const _db   = firebase.firestore();

  let _currentUser  = null;
  let _myFollowing  = new Set(); // UIDs I follow
  let _allProfiles  = [];        // raw Firestore docs
  let _activeFilter = '';        // tag filter
  let _sortMode     = 'random';

  const FIVE_MIN = 5 * 60 * 1000;

  // ── Auth ──────────────────────────────────────────────────────────────
  _auth.onAuthStateChanged(async user => {
    _currentUser = user;
    if (user) {
      // Update lastSeen
      _db.collection('profiles').doc(user.uid).set(
        { lastSeen: firebase.firestore.FieldValue.serverTimestamp() },
        { merge: true }
      ).catch(() => {});

      // Load who I follow
      const followSnap = await _db.collection('follows')
        .where('followerId', '==', user.uid).get().catch(() => ({ docs: [] }));
      followSnap.docs.forEach(d => _myFollowing.add(d.data().followedId));
    }
    loadProfiles();
  });

  // ── Load all profiles ─────────────────────────────────────────────────
  async function loadProfiles() {
    const snap = await _db.collection('profiles').get().catch(() => null);
    if (!snap) { document.getElementById('profile-grid').innerHTML = '<div class="empty-state">Could not load profiles.</div>'; return; }
    _allProfiles = snap.docs
      .map(d => ({ uid: d.id, ...d.data() }))
      .filter(p => p.handle); // skip incomplete profiles
    renderGrid();
  }

  // ── Render ────────────────────────────────────────────────────────────
  function renderGrid() {
    let profiles = [..._allProfiles];

    // Filter: skip own profile
    if (_currentUser) profiles = profiles.filter(p => p.uid !== _currentUser.uid);

    // Filter by active tag
    if (_activeFilter) {
      profiles = profiles.filter(p =>
        (p.tags || []).some(t => t.toLowerCase().includes(_activeFilter.toLowerCase())) ||
        (p.handle || '').toLowerCase().includes(_activeFilter.toLowerCase())
      );
    }

    // Filter by search text
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (q) {
      profiles = profiles.filter(p =>
        (p.handle || '').toLowerCase().includes(q) ||
        (p.tagline || '').toLowerCase().includes(q) ||
        (p.tags || []).some(t => t.toLowerCase().includes(q))
      );
    }

    // Sort
    const now = Date.now();
    if (_sortMode === 'online') {
      profiles = profiles.filter(p => {
        const ls = p.lastSeen?.toMillis?.();
        return ls && (now - ls) < FIVE_MIN;
      });
    } else if (_sortMode === 'active') {
      profiles.sort((a, b) => {
        const ta = a.updatedAt?.toMillis?.() || 0;
        const tb = b.updatedAt?.toMillis?.() || 0;
        return tb - ta;
      });
    } else {
      // random — shuffle
      for (let i = profiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [profiles[i], profiles[j]] = [profiles[j], profiles[i]];
      }
    }

    // Update count
    const label = _activeFilter ? ` tagged ${_activeFilter}` : '';
    const onlineLabel = _sortMode === 'online' ? ' · online now' : '';
    document.getElementById('result-count').textContent =
      `[ ${profiles.length} profile${profiles.length !== 1 ? 's' : ''}${label}${onlineLabel} ]`;

    // Render cards
    const grid = document.getElementById('profile-grid');
    if (!profiles.length) {
      grid.innerHTML = '<div class="empty-state">No profiles found.</div>';
      return;
    }
    grid.innerHTML = '';
    profiles.forEach(p => grid.appendChild(buildCard(p)));
  }

  function buildCard(p) {
    const isOnline = p.lastSeen?.toMillis && (Date.now() - p.lastSeen.toMillis()) < FIVE_MIN;
    const following = _myFollowing.has(p.uid);
    const tags = (p.tags || []).slice(0, 4);

    const card = document.createElement('div');
    card.className = 'pcard';
    card.innerHTML = `
      <div class="strip strip-${p.palette || 0}"></div>
      <div class="body">
        <div class="pname">${escHtml(p.handle || 'unknown')}</div>
        <div class="phandle">@${escHtml(p.handle || '')}</div>
        <div class="pline">${escHtml(p.tagline || '')}</div>
        <div class="ptags">${tags.map(t =>
          `<span class="ptag${_activeFilter && t.toLowerCase().includes(_activeFilter.toLowerCase()) ? ' match' : ''}">${escHtml(t)}</span>`
        ).join('')}</div>
      </div>
      <div class="card-footer">
        ${_currentUser ? `<button class="follow-btn${following ? ' following' : ''}" data-uid="${p.uid}">
          ${following ? 'following' : '+ follow'}
        </button>` : '<span></span>'}
        ${isOnline ? '<span class="online-badge"><span class="online-dot"></span>online</span>' : '<span></span>'}
      </div>`;

    // Follow button
    const followBtn = card.querySelector('.follow-btn');
    if (followBtn) {
      followBtn.addEventListener('click', e => { e.stopPropagation(); toggleFollow(p.uid, followBtn); });
    }

    // Card click → view profile + increment views
    card.addEventListener('click', () => {
      if (_currentUser) {
        _db.collection('profiles').doc(p.uid).set(
          { views: firebase.firestore.FieldValue.increment(1) },
          { merge: true }
        ).catch(() => {});
      }
      window.location.href = `editor-mockup.html?preview=1&viewuid=${p.uid}`;
    });

    return card;
  }

  // ── Follow / Unfollow ─────────────────────────────────────────────────
  async function toggleFollow(targetUid, btn) {
    if (!_currentUser) { window.location.href = 'signin.html'; return; }
    const myUid   = _currentUser.uid;
    const docId   = `${myUid}_${targetUid}`;
    const followRef = _db.collection('follows').doc(docId);
    const isFollowing = _myFollowing.has(targetUid);

    btn.disabled = true;
    if (isFollowing) {
      await followRef.delete().catch(() => {});
      _db.collection('profiles').doc(targetUid).set({ followerCount: firebase.firestore.FieldValue.increment(-1) }, { merge: true }).catch(() => {});
      _db.collection('profiles').doc(myUid).set({ followingCount: firebase.firestore.FieldValue.increment(-1) }, { merge: true }).catch(() => {});
      _myFollowing.delete(targetUid);
      btn.textContent = '+ follow';
      btn.classList.remove('following');
    } else {
      await followRef.set({ followerId: myUid, followedId: targetUid, createdAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(() => {});
      _db.collection('profiles').doc(targetUid).set({ followerCount: firebase.firestore.FieldValue.increment(1) }, { merge: true }).catch(() => {});
      _db.collection('profiles').doc(myUid).set({ followingCount: firebase.firestore.FieldValue.increment(1) }, { merge: true }).catch(() => {});
      _myFollowing.add(targetUid);
      btn.textContent = 'following';
      btn.classList.add('following');
    }
    btn.disabled = false;
  }

  // ── Search ────────────────────────────────────────────────────────────
  let _searchTimer;
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => {
      const val = document.getElementById('search-input').value.trim();
      if (val.startsWith('#') || (!val.includes(' ') && val.length > 1)) {
        setFilter(val);
        document.getElementById('search-input').value = '';
      } else {
        renderGrid();
      }
    }, 300);
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (val) { setFilter(val); e.target.value = ''; }
    }
  });

  function setFilter(tag) {
    _activeFilter = tag;
    renderActiveTag();
    renderGrid();
  }

  function renderActiveTag() {
    const row = document.getElementById('active-tags');
    const label = document.getElementById('browse-label');
    // remove old tag pills
    row.querySelectorAll('.active-tag').forEach(el => el.remove());
    if (_activeFilter) {
      label.style.display = '';
      const pill = document.createElement('span');
      pill.className = 'active-tag';
      pill.innerHTML = `${escHtml(_activeFilter)} <span class="x">×</span>`;
      pill.addEventListener('click', () => { _activeFilter = ''; renderActiveTag(); renderGrid(); });
      row.appendChild(pill);
    } else {
      label.style.display = 'none';
    }
  }

  // ── Sort ──────────────────────────────────────────────────────────────
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _sortMode = btn.dataset.sort;
      renderGrid();
    });
  });

  // ── Utils ─────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
