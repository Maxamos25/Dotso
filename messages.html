<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dotso — messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#16151A; --surface:#1E1D22; --surface-2:#26252B;
    --ink:#ECE9E2; --ink-soft:#9C98A6; --ink-faint:#6b6776;
    --line:#36343C; --amber:#D9A441; --amber-dim:#3a3022; --success:#4ECDC4;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ height:100%; }
  body{ background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  nav{ border-bottom:1px solid var(--line); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; background:var(--surface); flex-shrink:0; }
  .logo{ font-weight:700; font-size:15px; }
  .logo .mark{ color:var(--ink-faint); }
  .nav-right{ display:flex; gap:10px; align-items:center; }
  .nav-link{ font-size:13px; color:var(--amber); text-decoration:none; padding:6px 12px; border-radius:7px; opacity:0.65; }
  .nav-link:hover{ background:var(--surface-2); opacity:1; }

  .layout{ display:flex; flex:1; overflow:hidden; }

  /* sidebar */
  .sidebar{ width:280px; border-right:1px solid var(--line); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
  .sidebar-head{ padding:16px 18px; border-bottom:1px solid var(--line); flex-shrink:0; }
  .sidebar-head h2{ font-size:15px; font-weight:600; margin-bottom:2px; }
  .sidebar-head p{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint); }
  .sidebar-list{ flex:1; overflow-y:auto; }

  .convo-row{ display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.1s; }
  .convo-row:hover{ background:rgba(255,255,255,0.04); }
  .convo-row.active{ background:rgba(217,164,65,0.08); border-left:2px solid var(--amber); }
  .convo-avatar{ width:38px; height:38px; border-radius:9px; background:var(--surface-2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--ink-soft); }
  .convo-body{ flex:1; min-width:0; }
  .convo-handle{ font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500; }
  .convo-preview{ font-size:12px; color:var(--ink-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .convo-meta{ text-align:right; flex-shrink:0; }
  .convo-time{ font-size:11px; color:var(--ink-faint); }

  .sidebar-empty{ padding:28px 18px; text-align:center; color:var(--ink-faint); font-size:13px; line-height:1.7; }
  .sidebar-empty a{ color:var(--amber); text-decoration:none; }
  .sidebar-empty a:hover{ text-decoration:underline; }

  /* chat pane */
  .chat-pane{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .chat-header{ padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; flex-shrink:0; background:var(--surface); }
  .chat-header-avatar{ width:36px; height:36px; border-radius:8px; background:var(--surface-2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft); }
  .chat-header-info{ flex:1; }
  .chat-header-handle{ font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:500; }
  .chat-header-status{ font-size:12px; color:var(--success); margin-top:1px; display:flex; align-items:center; gap:5px; }
  .chat-header-status::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--success); display:inline-block; }

  .message-feed{ flex:1; overflow-y:auto; padding:20px 20px 0; display:flex; flex-direction:column; gap:2px; }
  .msg-date{ text-align:center; font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint); padding:12px 0; }
  .msg{ display:flex; gap:10px; margin:3px 0; align-items:flex-end; }
  .msg.mine{ flex-direction:row-reverse; }
  .msg-avatar{ width:28px; height:28px; border-radius:6px; background:var(--surface-2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--ink-faint); }
  .msg.mine .msg-avatar{ display:none; }
  .msg-bubble{ max-width:72%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.5; background:var(--surface-2); color:var(--ink); border:1px solid var(--line); }
  .msg.mine .msg-bubble{ background:var(--amber-dim); border-color:rgba(217,164,65,0.25); }
  .msg-time{ font-size:10.5px; color:var(--ink-faint); padding:0 4px; align-self:flex-end; flex-shrink:0; }

  .compose{ padding:16px 20px; border-top:1px solid var(--line); display:flex; gap:10px; align-items:flex-end; background:var(--surface); flex-shrink:0; }
  .compose-input{ flex:1; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:10px 14px; color:var(--ink); font-family:'Inter',sans-serif; font-size:14px; resize:none; outline:none; line-height:1.5; max-height:140px; overflow-y:auto; transition:border-color 0.12s; }
  .compose-input:focus{ border-color:rgba(217,164,65,0.4); }
  .compose-input:empty::before{ content:attr(data-placeholder); color:var(--ink-faint); pointer-events:none; }
  .send-btn{ width:38px; height:38px; border-radius:9px; background:var(--amber); border:none; color:#1a1408; font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background 0.12s; }
  .send-btn:hover{ background:#e6b556; }
  .send-btn:disabled{ background:var(--surface-2); color:var(--ink-faint); cursor:default; }

  .empty-pane{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--ink-faint); text-align:center; padding:40px; gap:12px; }
  .empty-pane .ep-icon{ font-size:32px; opacity:0.4; }
  .empty-pane p{ font-size:14px; line-height:1.65; max-width:320px; }
  .empty-pane .ep-note{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint); }
</style>
</head>
<body>

<nav>
  <div class="logo"><span class="mark">/</span>dotso</div>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link">← dashboard</a>
    <a href="browse-mockup.html" class="nav-link">browse</a>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>Messages</h2>
      <p>mutual follows only — no cold messages</p>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <div class="sidebar-empty">loading...</div>
    </div>
  </div>

  <div class="chat-pane" id="chat-pane">
    <div class="empty-pane" id="empty-pane">
      <div class="ep-icon">💬</div>
      <p>Your messages will show here once you and someone else follow each other.</p>
      <span class="ep-note"><a href="browse-mockup.html" style="color:var(--amber);text-decoration:none;">browse profiles →</a></span>
    </div>
  </div>
</div>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAj-pIFaW0OuDUfEbaOm_zFhu4fU9kXZbM",
    authDomain: "dotso-fec33.firebaseapp.com",
    projectId: "dotso-fec33",
    storageBucket: "dotso-fec33.firebasestorage.app",
    messagingSenderId: "202217283559",
    appId: "1:202217283559:web:8359ebd1844657b720a742"
  });
  const _auth = firebase.auth();
  const _db   = firebase.firestore();

  let _me = null;
  let _mutuals = []; // { uid, handle }
  let _activeConvoId = null;
  let _msgListener = null;

  _auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'signin.html'; return; }
    _me = user;
    await loadMutuals();
  });

  async function loadMutuals() {
    // Who I follow
    const iFollow = await _db.collection('follows').where('followerId','==',_me.uid).get().catch(() => ({docs:[]}));
    const iFollowSet = new Set(iFollow.docs.map(d => d.data().followedId));

    // Who follows me
    const followMe = await _db.collection('follows').where('followedId','==',_me.uid).get().catch(() => ({docs:[]}));
    const followMeSet = new Set(followMe.docs.map(d => d.data().followerId));

    // Mutual = in both sets
    const mutualUids = [...iFollowSet].filter(uid => followMeSet.has(uid));

    if (!mutualUids.length) {
      document.getElementById('sidebar-list').innerHTML =
        `<div class="sidebar-empty">No mutual follows yet.<br><a href="browse-mockup.html">Find people to follow →</a></div>`;
      return;
    }

    // Load their profiles
    const profiles = await Promise.all(mutualUids.map(uid =>
      _db.collection('profiles').doc(uid).get().then(d => ({ uid, handle: d.exists ? d.data().handle : uid }))
    ));
    _mutuals = profiles;
    renderSidebar();
  }

  function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    _mutuals.forEach(person => {
      const row = document.createElement('div');
      row.className = 'convo-row';
      row.dataset.uid = person.uid;
      row.innerHTML = `
        <div class="convo-avatar">${escHtml(person.handle.slice(0,2).toUpperCase())}</div>
        <div class="convo-body">
          <div class="convo-handle">@${escHtml(person.handle)}</div>
          <div class="convo-preview" id="preview-${person.uid}">tap to open</div>
        </div>`;
      row.addEventListener('click', () => openConvo(person));
      list.appendChild(row);

      // Load last message preview
      const convoId = makeConvoId(_me.uid, person.uid);
      _db.collection('conversations').doc(convoId).collection('messages')
        .orderBy('createdAt','desc').limit(1).get()
        .then(snap => {
          if (!snap.empty) {
            const d = snap.docs[0].data();
            const el = document.getElementById(`preview-${person.uid}`);
            if (el) el.textContent = (d.senderId === _me.uid ? 'you: ' : '') + d.text;
          }
        }).catch(() => {});
    });
  }

  function openConvo(person) {
    _activeConvoId = makeConvoId(_me.uid, person.uid);

    // Highlight sidebar row
    document.querySelectorAll('.convo-row').forEach(r => r.classList.remove('active'));
    document.querySelector(`.convo-row[data-uid="${person.uid}"]`)?.classList.add('active');

    // Unsubscribe old listener
    if (_msgListener) { _msgListener(); _msgListener = null; }

    // Build chat pane
    const pane = document.getElementById('chat-pane');
    pane.innerHTML = `
      <div class="chat-header">
        <div class="chat-header-avatar">${escHtml(person.handle.slice(0,2).toUpperCase())}</div>
        <div class="chat-header-info">
          <div class="chat-header-handle">@${escHtml(person.handle)}</div>
          <div class="chat-header-status">mutual follow</div>
        </div>
      </div>
      <div class="message-feed" id="feed"></div>
      <div class="compose">
        <div class="compose-input" contenteditable="true" data-placeholder="message @${escHtml(person.handle)}..." id="compose-box"></div>
        <button class="send-btn" id="send-btn" disabled>&#8593;</button>
      </div>`;

    const composeBox = pane.querySelector('#compose-box');
    const sendBtn    = pane.querySelector('#send-btn');
    composeBox.addEventListener('input', () => { sendBtn.disabled = !composeBox.textContent.trim(); });
    composeBox.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(person); } });
    sendBtn.addEventListener('click', () => sendMessage(person));

    // Real-time messages listener
    _msgListener = _db.collection('conversations').doc(_activeConvoId)
      .collection('messages').orderBy('createdAt','asc')
      .onSnapshot(snap => renderMessages(snap, person), () => {});
  }

  function renderMessages(snap, person) {
    const feed = document.getElementById('feed');
    if (!feed) return;
    feed.innerHTML = '';
    let lastDate = '';
    snap.docs.forEach(doc => {
      const d = doc.data();
      const ts = d.createdAt?.toDate ? d.createdAt.toDate() : new Date();
      const dateStr = ts.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
      if (dateStr !== lastDate) {
        lastDate = dateStr;
        const div = document.createElement('div');
        div.className = 'msg-date';
        div.textContent = dateStr;
        feed.appendChild(div);
      }
      const mine = d.senderId === _me.uid;
      const msg = document.createElement('div');
      msg.className = 'msg' + (mine ? ' mine' : '');
      const time = ts.getHours() + ':' + String(ts.getMinutes()).padStart(2,'0');
      msg.innerHTML = mine
        ? `<div><div class="msg-bubble">${escHtml(d.text)}</div></div><span class="msg-time">${time}</span>`
        : `<div class="msg-avatar">${escHtml(person.handle.slice(0,2).toUpperCase())}</div><div><div class="msg-bubble">${escHtml(d.text)}</div></div><span class="msg-time">${time}</span>`;
      feed.appendChild(msg);
    });
    feed.scrollTop = feed.scrollHeight;
  }

  async function sendMessage(person) {
    const box = document.getElementById('compose-box');
    const text = box.textContent.trim();
    if (!text || !_activeConvoId) return;
    box.textContent = '';
    document.getElementById('send-btn').disabled = true;

    await _db.collection('conversations').doc(_activeConvoId)
      .collection('messages').add({
        senderId:  _me.uid,
        text,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      }).catch(() => {});

    // Update sidebar preview
    const el = document.getElementById(`preview-${person.uid}`);
    if (el) el.textContent = 'you: ' + text;
  }

  function makeConvoId(uid1, uid2) { return [uid1, uid2].sort().join('_'); }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
